<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>KG Lab · 3D Constellation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/contrib/auto-render.min.js"></script>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#F4F3F0;overflow:hidden}
  body{font-family:'Pretendard Variable',Pretendard,-apple-system,system-ui,sans-serif;color:#0B0B0B}
  #graph{position:fixed;inset:0}
  #graph canvas{display:block}
  .hud{position:fixed;z-index:5;font-family:'JetBrains Mono',monospace;pointer-events:none}
  .hud--tl{top:22px;left:24px}
  .hud--tl .k{font-size:12px;font-weight:700;letter-spacing:.18em;color:#46464B}
  .hud--tl .t{font-size:13px;font-weight:500;letter-spacing:.04em;color:#9a978d;margin-top:6px}
  .legend{position:fixed;bottom:22px;left:24px;z-index:5;display:flex;flex-wrap:wrap;gap:8px 18px;
    font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:#46464B;pointer-events:none}
  .legend span{display:inline-flex;align-items:center;gap:8px}
  .legend i{width:11px;height:11px;border-radius:50%;display:inline-block}
  .meta{position:fixed;bottom:22px;right:24px;z-index:5;font-family:'JetBrains Mono',monospace;
    font-size:12px;font-weight:700;letter-spacing:.04em;color:#9a978d;text-align:right;pointer-events:none}
  .perf{position:fixed;top:22px;right:24px;z-index:6;font-family:'JetBrains Mono',monospace;
    font-size:12px;font-weight:700;letter-spacing:.04em;text-align:right;pointer-events:none;color:#46464B}
  .perf .fps{font-size:22px;font-weight:700;letter-spacing:0;color:#1F8A5B}
  .perf .fps.warn{color:#D9911F}
  .perf .fps.bad{color:#E0443E}
  .perf .sub{font-size:11px;font-weight:500;color:#9a978d;margin-top:3px}
  body.embed .perf, body.embed .meta{display:none}
  /* mobile landing: hide the legend (color key) — it overlapped the hint on the small box. viewport-based so it works regardless of touch detection. the hint stays (rewritten to touch gestures in JS). */
  @media (max-width:600px){
    body.embed .legend{display:none}
    body.embed .hint{white-space:nowrap;gap:8px;font-size:10px;letter-spacing:0;padding:5px 10px;bottom:12px;max-width:96vw}
  }
  /* onboarding hint (centred bottom) */
  .hint{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:5;
    font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;letter-spacing:.04em;
    color:#9a978d;pointer-events:none;white-space:nowrap;
    display:flex;gap:18px;align-items:center;
    background:rgba(252,251,248,0.66);border:1px solid rgba(70,70,75,0.08);border-radius:999px;
    padding:7px 16px;backdrop-filter:blur(4px)}
  .hint b{color:#46464B;font-weight:700}
  /* detail panel (click) */
  #panel{position:fixed;top:64px;right:24px;width:300px;z-index:7;
    background:rgba(252,251,248,0.92);border:1px solid rgba(70,70,75,0.12);border-radius:10px;
    box-shadow:0 8px 30px rgba(20,20,25,0.12);backdrop-filter:blur(6px);
    padding:16px 18px;transform:translateX(24px);opacity:0;pointer-events:none;
    transition:opacity .18s ease, transform .18s ease}
  #panel.show{opacity:1;transform:translateX(0);pointer-events:auto}
  #panel .pclose{position:absolute;top:10px;right:12px;cursor:pointer;border:0;background:none;
    font-size:18px;line-height:1;color:#9a978d;font-family:inherit}
  #panel .pchip{display:inline-flex;align-items:center;gap:7px;font-family:'JetBrains Mono',monospace;
    font-size:11px;font-weight:700;letter-spacing:.04em;color:#46464B;margin-bottom:10px}
  #panel .pchip i{width:10px;height:10px;border-radius:50%;display:inline-block}
  #panel .plabel{font-size:17px;font-weight:700;letter-spacing:-.01em;color:#0B0B0B;line-height:1.35;margin:0 0 8px}
  #panel .prow{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#6b6860;margin-top:6px;
    display:flex;justify-content:space-between;gap:12px}
  #panel .prow b{color:#0B0B0B;font-weight:700}
  /* learning-state panel (landing / parent-student view) */
  #panel.learn .pchip, #panel.learn .plabel, #panel.learn .ptech{display:none}
  #panel:not(.learn) #plearn{display:none}
  #plearn{max-height:64vh;overflow-y:auto;margin-right:-4px;padding-right:4px}
  #plearn .lbadge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;
    font-weight:700;letter-spacing:.06em;color:#13B5A6;margin-bottom:8px}
  #plearn .lstate{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;letter-spacing:.02em}
  #plearn .ltitle{font-size:18px;font-weight:700;letter-spacing:-.01em;color:#0B0B0B;margin:4px 0 4px;line-height:1.3}
  #plearn .lsub{font-size:12.5px;color:#6b6860;margin:0 0 6px;line-height:1.5}
  #plearn .lsec{margin-top:14px}
  #plearn .lsec-t{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.08em;
    text-transform:uppercase;color:#9a978d;margin-bottom:7px}
  #plearn .latoms{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:5px}
  #plearn .latoms li{font-size:12px;color:#46464B;line-height:1.4;padding-left:13px;position:relative}
  #plearn .latoms li:before{content:'·';position:absolute;left:3px;color:#C7C4BC;font-weight:700}
  #plearn .latoms li.lmore{color:#9a978d}
  #plearn .ln{display:flex;align-items:flex-start;gap:8px;padding:5px 0}
  #plearn .ln i{width:9px;height:9px;border-radius:50%;flex:none;margin-top:3px}
  #plearn .ln .lnmain{flex:1;display:flex;flex-direction:column;gap:1px;min-width:0}
  #plearn .ln .lnmain b{font-size:12.5px;font-weight:600;color:#0B0B0B;line-height:1.3}
  #plearn .ln .lnmain small{font-size:10.5px;color:#9a978d;line-height:1.2}
  #plearn .ln em{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;font-style:normal;flex:none;margin-top:2px}
  /* control panel (T7) */
  #ctrl{position:fixed;top:136px;left:24px;z-index:6;display:none;flex-direction:column;gap:14px;
    background:rgba(252,251,248,0.82);border:1px solid rgba(70,70,75,0.10);border-radius:10px;
    padding:13px 14px;backdrop-filter:blur(5px);box-shadow:0 4px 18px rgba(20,20,25,0.07);
    max-height:calc(100vh - 160px);overflow-y:auto}
  #ctrl.open{display:flex}
  #ctrlToggle{position:fixed;top:92px;left:24px;z-index:7;width:36px;height:36px;border-radius:9px;
    border:1px solid rgba(70,70,75,0.12);background:rgba(252,251,248,0.82);backdrop-filter:blur(5px);
    cursor:pointer;font-size:15px;line-height:1;color:#6b6860;box-shadow:0 4px 18px rgba(20,20,25,0.07);
    display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace}
  #ctrlToggle:hover{border-color:rgba(70,70,75,0.34);color:#0B0B0B}
  #ctrl .fxrow{margin-bottom:9px}
  #ctrl .fxrow:last-child{margin-bottom:0}
  #ctrl .fxname{font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:700;
    letter-spacing:.02em;color:#6b6860;margin-bottom:5px}
  #ctrl .fxsep{height:1px;background:rgba(70,70,75,0.10);margin:2px 0 4px}
  #ctrl .ctitle{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.12em;
    color:#9a978d;margin-bottom:7px;text-transform:uppercase}
  #ctrl .cbtns{display:flex;gap:6px;flex-wrap:wrap}
  #ctrl button{font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:700;cursor:pointer;
    border:1px solid rgba(70,70,75,0.16);background:#fff;color:#6b6860;border-radius:7px;padding:5px 10px;
    transition:all .12s ease}
  #ctrl button:hover{border-color:rgba(70,70,75,0.34)}
  #ctrl button.on{background:#0B0B0B;color:#FCFBF8;border-color:#0B0B0B}
  #ctrl .fxname b{color:#13B5A6;font-weight:700}
  #ctrl button .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
</style>

<body>
<div id="graph"></div>

<div class="hud hud--tl">
  <div class="k">KNOWLEDGE GRAPH · 3D CONSTELLATION</div>
  <div class="t" id="hudtitle">지식 그래프 — 개념 의존 신경망</div>
</div>
<div class="legend" id="legend"></div>
<div class="meta" id="meta">boot…</div>
<div class="perf"><div class="fps" id="fps">—</div><div class="sub" id="psub">WebGL · 3D-Force-Graph</div></div>
<div class="hint" id="hint">
  <span><b>드래그</b> 회전</span><span><b>스크롤</b> 확대</span><span><b>우드래그</b> 이동</span><span><b>클릭</b> 상세</span>
</div>
<div id="panel">
  <button class="pclose" id="pclose" aria-label="close">×</button>
  <div class="pchip" id="pchip"></div>
  <p class="plabel" id="plabel"></p>
  <div class="ptech">
    <div class="prow"><span>레이어</span><b id="player"></b></div>
    <div class="prow"><span>상태</span><b id="pstate"></b></div>
    <div class="prow"><span>역할</span><b id="prole"></b></div>
    <div class="prow"><span>연결</span><b id="pdeg"></b></div>
  </div>

</div>
<button id="ctrlToggle" title="효과 패널 (교수자용)" aria-label="효과 패널 열기">⚙</button>
<div id="ctrl">
  <div class="cgrp">
    <div class="ctitle">노드 간격</div>
    <div class="cbtns" id="spacing">
      <button data-sp="tight">좀게</button><button data-sp="normal" class="on">보통</button><button data-sp="wide">넓게</button>
    </div>
  </div>
  <div class="cgrp">
    <div class="ctitle">레이어 필터</div>
    <div class="cbtns" id="filters">
      <button data-ly="DATA" class="on"><span class="dot" style="background:#7048E8"></span>개념</button><button data-ly="LOGIC" class="on"><span class="dot" style="background:#2A6FDB"></span>논리</button><button data-ly="ACTION" class="on"><span class="dot" style="background:#1F8A5B"></span>동작</button><button data-ly="PROBLEM" class="on"><span class="dot" style="background:#D9911F"></span>문제</button>
    </div>
  </div>

    <div class="ctitle">레이아웃</div>
    <div class="cbtns" id="layout">
      <button data-lay="free" class="on">자유</button><button data-lay="hier">계층</button><button data-lay="topic">토픽</button>
    </div>
  </div>
  <div class="cgrp">
    <div class="ctitle">표시</div>
    <div class="cbtns">
      <button id="lblBtn">라벨</button>
    </div>
  </div>
  <div class="cgrp">
    <div class="ctitle">효과 · 라이브 비교</div>

      <button data-preset="demo">추천 연출</button><button data-preset="reset">전부 끔</button>
    </div>
    <div class="fxsep"></div>
    <div id="fx"></div>
  </div>
</div>

<!-- 3d-force-graph (bundles Three.js; global ForceGraph3D) -->
<script src="https://cdn.jsdelivr.net/npm/3d-force-graph"></script>
<!-- pilot ontology (window.__KGGRAPH / __KGSTATE) — swappable per student -->
<script src="../kg-data.js?v=1"></script>
<script>
/* ============================================================================
   KG LAB — 3D backend (3d-force-graph / Three.js).  PHASE T8: layout modes.
   Free (force), Hierarchy (DAG top-down by edge direction), and Topic-cluster
   (custom force anchoring nodes by topic on X and layer on Y).  Switchable
   from the control panel; cycles tolerated via onDagError.
   ============================================================================ */
(function(){
  'use strict';

  if (typeof ForceGraph3D === 'undefined'){
    document.getElementById('meta').textContent = 'ERROR: 3d-force-graph failed to load';
    console.error('[KG-3D] ForceGraph3D global missing');
    return;
  }

  var BG = '#F4F3F0';
  var el = document.getElementById('graph');

  // ---- layer palette (matches the 2D build) --------------------------------
  var LAYER = {
    DATA:    {color:'#7048E8', size:6.0, name:'DATA · 개념'},
    LOGIC:   {color:'#2A6FDB', size:3.4, name:'LOGIC · 논리'},
    ACTION:  {color:'#1F8A5B', size:3.4, name:'ACTION · 동작'},
    PROBLEM: {color:'#D9911F', size:2.8, name:'PROBLEM · 문제'}
  };
  function layerOf(n){ return LAYER[n.layer] || LAYER.DATA; }

  // ---- student state palette (DIRECTION-MODEL §B) --------------------------
  var STATE = {
    mastered: {color:'#1F8A5B', glow:0.40, name:'숙련'},
    current:  {color:'#13B5A6', glow:0.48, name:'이번주'},
    learning: {color:'#E0A50E', glow:0.34, name:'학습중'},
    weak:     {color:'#E0443E', glow:0.34, name:'보강필요'},
    todo:     {color:'#C7C4BC', glow:0.10, name:'예정'}
  };
  var STATE_ORDER = ['mastered','current','learning','weak','todo'];
  var kgState = (window.__KGSTATE && window.__KGSTATE.state) || {};
  function stateOf(n){ return kgState[n.id] || 'todo'; }

  // ---- focus set (Q1c): explicit __KGSTATE.focus wins; else derive from --------
  //      charged states (current/learning/weak = "이번 주 학습/약점보강").  This is the
  //      SINGLE derivation point every effect (flow boost, camera) reads from, so
  //      swapping the ontology/student data needs zero code change.
  var kgFocus = (window.__KGSTATE && Array.isArray(window.__KGSTATE.focus) && window.__KGSTATE.focus.length)
                  ? window.__KGSTATE.focus : null;
  var FOCUS_DERIVED = { current:1, learning:1, weak:1 };
  function isFocusNode(id){
    if (kgFocus) return kgFocus.indexOf(id) !== -1;
    return !!FOCUS_DERIVED[kgState[id] || 'todo'];
  }
  // an edge is "this week's activity" if it touches a focus node (boost_scope: widest)
  function isFocusLink(l){ return isFocusNode(endId(l.source)) || isFocusNode(endId(l.target)); }

  // colour channel switches with view mode (one channel at a time)
  var mode = 'state';
  function colorOf(n){ return mode==='state' ? (STATE[stateOf(n)]||STATE.todo).color : layerOf(n).color; }
  function glowOf(n){ return mode==='state' ? (STATE[stateOf(n)]||STATE.todo).glow : 0.32; }

  // ---- focus+context highlight state (T6) ----------------------------------
  var hoverId = null, neighbor = {}, hLinks = (typeof Set!=='undefined'? new Set() : null);
  function computeNeighbors(node){
    neighbor = {}; hLinks = new Set();
    if (!node) return;
    neighbor[node.id] = 1;
    Graph.graphData().links.forEach(function(l){
      var s=endId(l.source), t=endId(l.target);
      if (s===node.id || t===node.id){ neighbor[s]=1; neighbor[t]=1; hLinks.add(l); }
    });
  }
  function nodeColorH(n){
    if (hoverId && !neighbor[n.id]) return 'rgba(120,120,128,0.10)';   // dim non-neighbours
    return colorOf(n);
  }
  function linkColorH(l){
    if (hoverId) return hLinks.has(l) ? 'rgba(70,80,110,0.85)' : 'rgba(120,128,156,0.05)';
    if (FLOWMODE==='boost' || FLOWMODE==='boost2'){            // P3: focus lines glow, rest go dark
      if (isFocusLink(l)){ var f=flowBoost(l); var c=(f&&STATE[f.state])?STATE[f.state].color:'#13B5A6';
        return hexA(c, FLOWMODE==='boost2'?0.9:0.6); }
      return 'rgba(120,128,156,0.05)';
    }
    return l.kind==='topic-bridge' ? 'rgba(201,154,58,0.7)' : 'rgba(120,128,156,0.28)';
  }
  function linkWidthH(l){
    if (hoverId && hLinks.has(l)) return 1.4;
    if ((FLOWMODE==='boost'||FLOWMODE==='boost2') && isFocusLink(l)) return FLOWMODE==='boost2'?1.3:0.85;
    return l.kind==='topic-bridge' ? 0.7 : 0.35;
  }

  // ---- scene from pilot ontology (swappable) -------------------------------
  var graph = window.__KGGRAPH;
  var nodeIds = {}; graph.nodes.forEach(function(n){ nodeIds[n.id]=1; });
  var nodes = graph.nodes.map(function(n){
    return { id:n.id, label:n.label, role:n.role, layer:n.layer, topic:n.topic };
  });
  var links = graph.edges.map(function(e){
    if (!nodeIds[e.s] || !nodeIds[e.t]) return null;
    return { source:e.s, target:e.t, kind:e.kind };
  }).filter(Boolean);

  function linkColor(l){ return l.kind==='topic-bridge' ? 'rgba(201,154,58,0.7)' : 'rgba(120,128,156,0.28)'; }

  var Graph = ForceGraph3D({ rendererConfig: { antialias: true, preserveDrawingBuffer: true } })(el)
    .backgroundColor(BG)
    .showNavInfo(false)
    .width(window.innerWidth)
    .height(window.innerHeight)
    .nodeRelSize(4)
    .nodeVal(function(n){ return layerOf(n).size; })
    .nodeColor(colorOf)
    .nodeOpacity(0.95)
    .nodeResolution(14)
    .linkColor(linkColor)
    .linkWidth(function(l){ return l.kind==='topic-bridge' ? 0.7 : 0.35; })
    .linkOpacity(0.5)
    .cooldownTicks(220)
    .graphData({ nodes: nodes, links: links });

  // density tuning: stronger repulsion + moderate link length so clusters
  // separate and the graph fills space without collapsing into a hairball.
  Graph.d3Force('charge').strength(-190);
  Graph.d3Force('link').distance(50).strength(0.3);

  // ---- light-theme glow: soft self-emission on the existing sphere material
  //      (re-applied after each layout settle, so data swaps keep the look) ---
  function applyNodeGlow(){
    var ns = Graph.graphData().nodes;
    for (var i=0;i<ns.length;i++){
      var o = ns[i].__threeObj; if(!o || !o.material || !o.material.emissive) continue;
      o.material.emissive.set(colorOf(ns[i]));
      o.material.emissiveIntensity = (hoverId && !neighbor[ns[i].id]) ? 0.02 : glowOf(ns[i]);
      o.material.needsUpdate = true;
    }
  }
  function tuneLights(){
    // re-applied after lights exist in the scene (library adds them post-construct)
    Graph.scene().children.forEach(function(ch){
      if (ch.type === 'DirectionalLight') ch.intensity = Math.min(ch.intensity, 1.4);
    });
  }
  var wantFit = true;   // auto-fit only on initial settle + explicit layout/spacing changes
  // responsive fit: zoomToFit's padding is absolute px, so the old fixed 90
  // swamped the small ~337px mobile iframe and shrank nodes to specks. Use a
  // small pad on narrow viewports; keep desktop's 90 unchanged.
  function isSmallView(){ return Math.min(window.innerWidth, window.innerHeight) < 600; }
  function fitGraph(ms){ Graph.zoomToFit(ms==null?400:ms, isSmallView()?18:90); }
  Graph.onEngineStop(function(){ if(wantFit){ fitGraph(600); wantFit=false; } applyNodeGlow(); tuneLights(); });
  setTimeout(function(){ applyNodeGlow(); tuneLights(); }, 700);
  // safety-net frame (mobile only): onEngineStop can fire late/never on slow
  // devices; guarantee an early framed graph. The settle fit above still refines.
  setTimeout(function(){ if(isSmallView()) fitGraph(600); }, 1200);

  // ---- directional flow particles (DIRECTION-MODEL §A) ----------------------
  // flow goes from what's known -> what it enables; a link emits only when its
  // flow-source node is charged.  Direction realised via signed particle speed.
  var FLOWDIR = {
    'has-prerequisite':'reverse', 'consumes-data':'reverse',
    'requires-substitution-trace':'reverse', 'solves':'reverse',
    'supports-action':'forward', 'parameter-affects':'forward',
    'representation-of':'both', 'topic-includes':'both', 'topic-bridge':'both'
  };
  var EMIT = { mastered:1, current:1, learning:1 };
  function endId(e){ return (e && e.id!=null) ? e.id : e; }
  function flowOf(l){
    var d = FLOWDIR[l.kind] || 'forward';
    var sId = endId(l.source), tId = endId(l.target);
    var cands = d==='forward' ? [[sId,tId]] : d==='reverse' ? [[tId,sId]] : [[sId,tId],[tId,sId]];
    for (var i=0;i<cands.length;i++){
      var st = kgState[cands[i][0]] || 'todo';
      if (EMIT[st]) return { from:cands[i][0], state:st, sourceIsFrom:(cands[i][0]===sId) };
    }
    return null;
  }
  // ---- flow modes (P3) ------------------------------------------------------
  // off / std / boost / boost2.  boost = focus-only flow: particles ONLY on
  // edges touching a focus node (이번 주 활동), non-focus edges go silent, and
  // boosted lines glow with bigger/brighter particles.  All derived from the
  // focus-set — swap the ontology/student and it re-targets automatically.
  var FLOW_SPEED = 0.0016, FLOWMODE = 'std';
  function hexA(hex,a){ var h=hex.replace('#',''); return 'rgba('+parseInt(h.substr(0,2),16)+','+parseInt(h.substr(2,2),16)+','+parseInt(h.substr(4,2),16)+','+a+')'; }
  function flowBoost(l){                       // emission for a focus-touching edge
    var sId=endId(l.source), tId=endId(l.target);
    var sF=isFocusNode(sId), tF=isFocusNode(tId);
    if(!sF && !tF) return null;
    var f=flowOf(l); if(f) return f;           // honour kind direction + charged source

  // runs only when something is actually animating (state view or idle on or

  var phase = {}; nodes.forEach(function(n){ phase[n.id] = Math.random()*6.283; });

  var clickFx = 'std';

  var ADJ = {}; nodes.forEach(function(n){ ADJ[n.id]=[]; });
  links.forEach(function(l){ var a=endId(l.source),b=endId(l.target);
    if(ADJ[a]) ADJ[a].push(b); if(ADJ[b]) ADJ[b].push(a); });
  function hasPulses(){ for(var k in pulseStart){ return true; } return false; }

    if (clickFx==='std' || !node) return;
    var now=performance.now();
    if (clickFx==='pulse'){ firePulse(node.id, now, 0, 0.95); return; }
    var seen={}, q=[[node.id,0]]; seen[node.id]=1;          // chain: BFS depth<=3 staggered
    while(q.length){ var cur=q.shift(), id=cur[0], dep=cur[1];
      firePulse(id, now, dep*120, Math.max(0.22, 0.95-dep*0.24));
      if(dep<3) (ADJ[id]||[]).forEach(function(nb){ if(!seen[nb]){ seen[nb]=1; q.push([nb,dep+1]); } });

  }
  function baseEm(n){ return (hoverId && !neighbor[n.id]) ? 0.02 : glowOf(n); }
  function animateNodes(now){
    if (mode!=='state' && IDLE==='off' && !hoverId && !intro.active && !hasPulses()) return;
    var t = now/1000, ns = Graph.graphData().nodes;
    for (var i=0;i<ns.length;i++){
      var n=ns[i], o=n.__threeObj; if(!o||!o.material) continue;
      var ph=phase[n.id]||0, sc=1, em=baseEm(n);
      if (mode==='state'){
        var s=kgState[n.id]||'todo';
        if (s==='current'){ sc*=1+0.12*Math.sin(t*2.2+ph); em=0.48+0.22*Math.sin(t*2.2+ph); }
        else if (s==='learning'){ sc*=1+0.07*Math.sin(t*1.8+ph); }
        else if (s==='weak'){ sc*=1+0.05*Math.sin(t*1.2+ph); em=0.34+0.12*Math.sin(t*1.2+ph); }
      }

        if (IDLE==='twinkle'||IDLE==='both') em += 0.10*(0.5+0.5*Math.sin(t*2.6+ph*2.3));
      }

      if (pu){

        else if (pt>=pu.dur){ delete pulseStart[n.id]; }
      }

        var e = 1-Math.pow(1-p,3);                       // easeOutCubic

    if (intro.active){
      var tt = now-intro.t0;
      var lp = Math.max(0, Math.min(1, (tt-(intro.dur-900))/700));
      Graph.linkOpacity(0.5*lp);
      if (tt >= intro.dur) revealAll();
    }
  }
  function resetNodeAnim(){
    var ns=Graph.graphData().nodes;
    for (var i=0;i<ns.length;i++){ var o=ns[i].__threeObj; if(o) o.scale.setScalar(1); }
    applyNodeGlow();
  }
  // idle ambient family (P1). breathe = gentle global scale; twinkle = star-like
  // emissive shimmer; 은은 = both. all phase-offset per node, all modes.
  registerFX('idle', '앰비언트 모션', [
    { id:'off',     label:'끔',     apply:function(){ IDLE='off'; resetNodeAnim(); } },
    { id:'breathe', label:'호흡',   apply:function(){ IDLE='breathe'; } },
    { id:'twinkle', label:'반짝임', apply:function(){ IDLE='twinkle'; } },
    { id:'both',    label:'은은',   apply:function(){ IDLE='both'; } }
  ], 'off');
  // intro / reveal family (P2). assemble = layer-staggered pop-in;
  // ignite = BFS wave from the focus set (이번 주 학습 영역) rippling outward.
  // re-clicking a variant replays it; reads only graph + focus-set (swap-safe).
  var intro = { mode:'off', active:false, t0:0, dur:0 };
  var LAYER_ORDER = { DATA:0, LOGIC:1, ACTION:2, PROBLEM:3 };
  var bfsDepth = {};
  function computeBfsDepth(){
    bfsDepth = {};
    var adj={}; nodes.forEach(function(n){ adj[n.id]=[]; });
    links.forEach(function(l){ var a=endId(l.source),b=endId(l.target);
      if(adj[a]) adj[a].push(b); if(adj[b]) adj[b].push(a); });
    var q=[], seen={};
    nodes.forEach(function(n){ if(isFocusNode(n.id)){ bfsDepth[n.id]=0; seen[n.id]=1; q.push(n.id); } });
    if(!q.length){                                       // no focus -> seed highest-degree hub
      var top=nodes.slice().sort(function(a,b){ return (DEG[b.id]||0)-(DEG[a.id]||0); })[0];
      if(top){ bfsDepth[top.id]=0; seen[top.id]=1; q.push(top.id); }
    }
    while(q.length){ var id=q.shift();
      (adj[id]||[]).forEach(function(nb){ if(!seen[nb]){ seen[nb]=1; bfsDepth[nb]=bfsDepth[id]+1; q.push(nb); } }); }
    var mx=0; Object.keys(bfsDepth).forEach(function(k){ mx=Math.max(mx,bfsDepth[k]); });
    nodes.forEach(function(n){ if(bfsDepth[n.id]==null) bfsDepth[n.id]=mx+1; });
  }
  function revealAll(){
    intro.active=false;
    var ns=Graph.graphData().nodes;
    for(var i=0;i<ns.length;i++){ var o=ns[i].__threeObj; if(o){ o.scale.setScalar(1); if(o.material) o.material.opacity=0.95; } }
    Graph.linkOpacity(0.5);
    applyNodeGlow();
  }
  function startIntro(m){
    if(m==='off'){ revealAll(); intro.mode='off'; return; }
    intro.mode=m;
    if(m==='ignite') computeBfsDepth();
    var maxEnd=0;
    nodes.forEach(function(n){
      var d = (m==='ignite') ? (bfsDepth[n.id]||0)*180 + Math.random()*80
                             : (LAYER_ORDER[n.layer]||0)*260 + Math.random()*160;
      n.__revDelay=d; n.__revDur=(m==='ignite')?460:540;
      maxEnd=Math.max(maxEnd, d+n.__revDur);
    });
    intro.dur = maxEnd + 500;
    intro.t0 = performance.now();
    intro.active = true;
    Graph.linkOpacity(0);
  }
  registerFX('intro', '인트로 / 리빌', [
    { id:'off',      label:'끔',   apply:function(){ startIntro('off'); } },
    { id:'assemble', label:'조립', apply:function(){ startIntro('assemble'); } },
    { id:'ignite',   label:'점화', apply:function(){ startIntro('ignite'); } }
  ], 'off');
  // click feedback family (P4)
  registerFX('click', '클릭 피드백', [
    { id:'std',   label:'기본', apply:function(){ clickFx='std'; } },
    { id:'pulse', label:'펄스', apply:function(){ clickFx='pulse'; } },
    { id:'chain', label:'체인', apply:function(){ clickFx='chain'; } }
  ], 'std');

  // ---- camera direction family (P5): off / orbit / tour ---------------------
  // orbit = gentle continuous auto-rotate; tour = cinematic fly between focus
  // nodes (이번 주 영역 순회). tour targets come from the focus-set (swap-safe).
  var CAM='off', tourTimer=null, tourIdx=0, tourNodes=[];
  function camStop(){ Graph.controls().autoRotate=false; if(tourTimer){ clearInterval(tourTimer); tourTimer=null; } }
  function flyToTour(){
    if(!tourNodes.length) return;
    var n=tourNodes[tourIdx % tourNodes.length]; tourIdx++;
    if(n.x==null) return;
    var d=90, r=1 + d/Math.max(1, Math.hypot(n.x||0,n.y||0,n.z||0));
    Graph.cameraPosition({x:(n.x||0)*r, y:(n.y||0)*r, z:(n.z||0)*r}, n, 1600);
  }
  registerFX('camera', '카메라 연출', [
    { id:'off',   label:'끔',   apply:function(){ camStop(); CAM='off'; } },
    { id:'orbit', label:'회전', apply:function(){ camStop(); CAM='orbit';
        Graph.controls().autoRotate=true; Graph.controls().autoRotateSpeed=0.6; } },
    { id:'tour',  label:'투어', apply:function(){ camStop(); CAM='tour';
        tourNodes = Graph.graphData().nodes.filter(function(n){ return isFocusNode(n.id); });
        if(!tourNodes.length) tourNodes = Graph.graphData().nodes.slice()
          .sort(function(a,b){ return (DEG[b.id]||0)-(DEG[a.id]||0); }).slice(0,6);
        tourIdx=0; flyToTour(); tourTimer=setInterval(flyToTour, 3200); } }
  ], 'off');

  // one-click presets: curated combo vs. all-off (operates the same registry)
  document.getElementById('fxpreset').addEventListener('click', function(e){
    var b=e.target.closest('button'); if(!b) return;
    [].forEach.call(this.children, function(x){ x.classList.remove('on'); }); b.classList.add('on');
    var P = b.dataset.preset==='demo'
      ? { idle:'both', intro:'off', flow:'boost', click:'pulse', camera:'orbit' }
      : { idle:'off',  intro:'off', flow:'std',   click:'std',   camera:'off' };
    Object.keys(P).forEach(function(k){ setFX(k, P[k]); });
  });

  // embed mode (landing iframe): ?embed=1 → highlight this week's focus area by
  // default (강화 flow + 은은 idle) and hide dev chrome. standalone lab stays neutral.
  (function(){
    var qs = new URLSearchParams(location.search);
    var teacher = qs.has('teacher') || qs.has('tech');
    PANELMODE = teacher ? 'tech' : 'learn';      // learning view is the default
    panel.classList.toggle('learn', !teacher);
    if (qs.has('embed') || qs.has('focus')){
      document.body.classList.add('embed');
      setFX('flow','off'); setFX('idle','both');
      if (!teacher){                                    // landing: hide dev chrome (⚙ gear). add ?teacher to reveal.
        var _tg=document.getElementById('ctrlToggle'); if(_tg) _tg.style.display='none';
      }
      if (isSmallView()){                               // mobile: swap mouse hint → touch gestures
        var _hn=document.getElementById('hint');
        if(_hn) _hn.innerHTML='<span><b>한 손</b> 터치 후 드래그</span><span><b>두 손</b> 확대/축소</span><span><b>구 모양</b> 탭 상세보기</span>';
      }
    }
  })();

  // mobile (embed only): one finger rotates, two fingers pinch-zoom/pan, tap
  // selects. OrbitControls needs touch-action:none to OWN the gestures — the old
  // pan-y + enabled-toggle silently broke pinch (pan-y strips pinch; toggling
  // enabled drops the first pointer so the 2-finger pair never forms). The graph
  // is a short band of a long page, so page scroll still works by starting the
  // swipe above/below the box. HUD chrome (hint/legend) hidden for a clean
  // landing; node detail is rendered by the parent BELOW the box (postMessage).
  (function(){
    var isTouch = (window.matchMedia && matchMedia('(pointer:coarse)').matches) || ('ontouchstart' in window);
    if (!isTouch || !document.body.classList.contains('embed')) return;
    var dom = Graph.renderer().domElement;
    dom.style.touchAction = 'none';        // hand 1/2-finger gestures to OrbitControls
    Graph.controls().enabled = true;       // default touches: 1=rotate, 2=dolly(pinch)+pan
  })();

  (function loop(){
    frames++;
    var now = performance.now();
    animateNodes(now);
    updateLabels();
    if (now - lastT >= 250){
      var fps = Math.round(frames * 1000 / (now - lastT));
      frames = 0; lastT = now;
      fpsEl.textContent = fps;
      fpsEl.className = 'fps' + (fps < 30 ? ' bad' : (fps < 50 ? ' warn' : ''));
    }
    requestAnimationFrame(loop);
  })();

  console.log('[KG-3D] T8 layout modes ok · free / hierarchy(dag) / topic-cluster');
})();
</script>
